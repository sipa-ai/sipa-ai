{% extends "base.html" %}
{% block title %}{% if agent %}Edit {{ agent.name }}{% else %}New agent{% endif %}{% endblock %}
{% block content %}

<div class="mb-6"><a href="/team" class="text-stone-500 hover:text-stone-800 text-sm">← Team</a></div>

<div class="max-w-2xl">
  <h2 class="text-xl font-semibold mb-6">{% if agent %}Edit {{ agent.name }}{% else %}New agent{% endif %}</h2>

  {% if error %}
  <div class="bg-red-50 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">Name <span class="text-stone-400 font-normal">(slug, lowercase, no spaces)</span></label>
      <input name="name" type="text" {% if not agent %}required{% endif %}
        value="{{ agent.name if agent else '' }}" placeholder="e.g. assistant"
        class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">Description</label>
      <input name="description" type="text" value="{{ agent.description if agent else '' }}"
        placeholder="e.g. Event Coordinator"
        class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">Model</label>
      <select name="model" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
        {% for m in models %}
        <option value="{{ m }}" {% if agent and agent.model == m %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">Instructions</label>
      <textarea name="system_prompt" rows="20" required
        class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-amber-400">{{ agent.system_prompt if agent else '' }}</textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="bg-stone-800 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-stone-700">
        {% if agent %}Save changes{% else %}Create agent{% endif %}
      </button>
      <a href="/team" class="px-5 py-2 rounded-lg text-sm bg-stone-100 text-stone-700 hover:bg-stone-200">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
