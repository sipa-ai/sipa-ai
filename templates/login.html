<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — {{ app_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">
    <h1 class="text-2xl font-semibold text-stone-800 mb-1">{{ app_name }}</h1>
    <p class="text-stone-500 text-sm mb-8">Admin Portal</p>

    {% if error %}
    <p class="bg-red-50 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Username</label>
        <input name="username" type="text" autofocus required
          class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
        <input name="password" type="password" required
          class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <button type="submit"
        class="w-full bg-stone-800 text-white rounded-lg py-2 text-sm font-medium hover:bg-stone-700 transition">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
