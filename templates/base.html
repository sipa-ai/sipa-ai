<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">

  <nav class="bg-stone-800 text-white shadow">
    <div class="px-4 py-3 flex items-center justify-between">
      <span class="font-semibold tracking-wide text-amber-400">{{ app_name }}</span>

      <!-- Desktop links -->
      <div class="hidden sm:flex items-center gap-6 text-sm">
        <a href="/posts"         class="hover:text-amber-300 {% if request.url.path.startswith('/posts')         %}text-amber-400 font-medium{% endif %}">Posts</a>
        <a href="/projects"      class="hover:text-amber-300 {% if request.url.path.startswith('/projects')      %}text-amber-400 font-medium{% endif %}">Projects</a>
        <a href="/tasks"         class="hover:text-amber-300 {% if request.url.path.startswith('/tasks')         %}text-amber-400 font-medium{% endif %}">Tasks</a>
        <a href="/contacts"      class="hover:text-amber-300 {% if request.url.path.startswith('/contacts')      %}text-amber-400 font-medium{% endif %}">Contacts</a>
        <a href="/emails"        class="hover:text-amber-300 {% if request.url.path.startswith('/emails')        %}text-amber-400 font-medium{% endif %}">Emails</a>
        <a href="/team"          class="hover:text-amber-300 {% if request.url.path.startswith('/team')          %}text-amber-400 font-medium{% endif %}">Team</a>
        <a href="/brand"         class="hover:text-amber-300 {% if request.url.path.startswith('/brand')         %}text-amber-400 font-medium{% endif %}">Brand</a>
        <a href="/settings"      class="hover:text-amber-300 {% if request.url.path == '/settings' or request.url.path.startswith('/settings/email') or request.url.path.startswith('/settings/gmail') %}text-amber-400 font-medium{% endif %}">Settings</a>
        <a href="/logout"        class="text-stone-400 hover:text-white ml-2">Logout</a>
      </div>

      <!-- Mobile hamburger -->
      <button id="nav-toggle" class="sm:hidden p-1.5 rounded text-stone-300 hover:text-white focus:outline-none" aria-label="Open menu">
        <svg id="icon-open"   class="w-5 h-5"         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg id="icon-close"  class="w-5 h-5 hidden"  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="nav-menu" class="hidden sm:hidden border-t border-stone-700 px-4 py-3 flex flex-col gap-3 text-sm">
      <a href="/posts"         class="hover:text-amber-300 {% if request.url.path.startswith('/posts')         %}text-amber-400 font-medium{% endif %}">Posts</a>
      <a href="/projects"      class="hover:text-amber-300 {% if request.url.path.startswith('/projects')      %}text-amber-400 font-medium{% endif %}">Projects</a>
      <a href="/tasks"         class="hover:text-amber-300 {% if request.url.path.startswith('/tasks')         %}text-amber-400 font-medium{% endif %}">Tasks</a>
      <a href="/contacts"      class="hover:text-amber-300 {% if request.url.path.startswith('/contacts')      %}text-amber-400 font-medium{% endif %}">Contacts</a>
      <a href="/emails"        class="hover:text-amber-300 {% if request.url.path.startswith('/emails')        %}text-amber-400 font-medium{% endif %}">Emails</a>
      <a href="/team"          class="hover:text-amber-300 {% if request.url.path.startswith('/team')          %}text-amber-400 font-medium{% endif %}">Team</a>
      <a href="/brand"         class="hover:text-amber-300 {% if request.url.path.startswith('/brand')         %}text-amber-400 font-medium{% endif %}">Brand</a>
      <a href="/settings"      class="hover:text-amber-300 {% if request.url.path == '/settings' or request.url.path.startswith('/settings/email') or request.url.path.startswith('/settings/gmail') %}text-amber-400 font-medium{% endif %}">Settings</a>
      <a href="/logout"        class="text-stone-400 hover:text-white">Logout</a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6 sm:py-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const menu   = document.getElementById('nav-menu');
    const open   = document.getElementById('icon-open');
    const close  = document.getElementById('icon-close');
    toggle.addEventListener('click', () => {
      const hidden = menu.classList.toggle('hidden');
      open.classList.toggle('hidden', !hidden);
      close.classList.toggle('hidden', hidden);
    });
  </script>
</body>
</html>
